name: Update Cosmos Data

on:
  schedule:
    # Runs daily at 8am UTC (1am PT / 4am ET)
    - cron: '0 8 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Cosmos scraper
        run: python update-cosmos.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet cosmos-data.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cosmos-data.json
          git commit -m "chore: update cosmos-data.json (automated)"
          git push
