<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUES OF SATURN</title>
  <meta name="description" content="Hues of Saturn — a creative universe by Nicole Deschamps">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1FA90;</text></svg>">
  <link rel="stylesheet" href="css/style.css?v=20260403u">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <a href="#gallery-section" class="sr-only">Skip to gallery</a>

  <!-- ============================================ -->
  <!-- SECTION 1: HERO — SATURN + INSPIRATION RING -->
  <!-- ============================================ -->
  <section id="hero" class="hero">
    <div class="stars" id="stars"></div>
    <div class="sparkles" id="sparkles"></div>

    <div class="saturn-container" id="saturn">
      <div class="saturn-glow"></div>
      <div class="saturn-body">
        <img src="assets/saturn-face-transparent.png" alt="Hues of Saturn" />
        <div class="saturn-highlight"></div>
        <div class="saturn-shadow"></div>
      </div>
      <!-- Innermost ring — Your art -->
      <div class="saturn-ring-back ring-art" id="artRingBack"></div>
      <div class="saturn-ring-front ring-art" id="artRingFront"></div>
      <!-- Middle ring — Are.na -->
      <div class="saturn-ring-back ring-arena" id="arenaRingBack"></div>
      <div class="saturn-ring-front ring-arena" id="arenaRingFront"></div>
      <!-- Outer ring — Cosmos -->
      <div class="saturn-ring-back ring-cosmos" id="cosmosRingBack"></div>
      <div class="saturn-ring-front ring-cosmos" id="cosmosRingFront"></div>
    </div>

    <div class="hero-title">
      <h1 class="title-main">Hues of</h1>
      <h1 class="title-main title-saturn">Saturn</h1>
    </div>

    <p class="orbit-label">in my orbit</p>

    <div class="scroll-hint" id="scrollHint">
      <span>scroll down</span>
      <div class="scroll-arrow"></div>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- SECTION 2: THE ELEVATOR — PORTAL DOORS       -->
  <!-- ============================================ -->
  <section id="elevator-section" class="elevator-section">
    <div class="elevator-container">
      <!-- Elevator interior walls -->
      <div class="elevator-wall elevator-wall-left">
        <div class="wall-handrail"></div>
      </div>
      <div class="elevator-wall elevator-wall-right">
        <div class="wall-handrail"></div>
      </div>
      <div class="elevator-ceiling"></div>
      <div class="elevator-floor-surface"></div>
      <!-- Ambient lighting overlay -->
      <div class="elevator-ambient-light"></div>

      <!-- Frame around the doors -->
      <div class="elevator-frame">
        <div class="frame-top"></div>
        <div class="frame-left"></div>
        <div class="frame-right"></div>
      </div>

      <!-- Floor indicator display -->
      <div class="floor-indicator" id="floorIndicator">
        <span class="indicator-arrow" id="indicatorArrow"></span>
        <span class="indicator-floor">★</span>
      </div>

      <!-- Behind the doors — text floors -->
      <div class="elevator-behind" id="elevatorBehind">
        <div class="behind-content" id="behindText">
          <h2 class="behind-title">HUES OF DISPOSITIONS</h2>
          <p class="behind-subtitle">thoughts pending...</p>
        </div>

        <!-- Gallery floor -->
        <div class="behind-gallery" id="behindGallery">
          <div class="gallery-hallway" id="galleryHallway">
            <div class="hallway-perspective" id="hallwayInner">
              <div class="wall-surface-left"></div>
              <div class="wall-surface-right"></div>
              <div class="hallway-floor"></div>
              <div class="hallway-ceiling"></div>
              <div class="hallway-wall-left" id="wallLeft"></div>
              <div class="hallway-wall-right" id="wallRight"></div>
            </div>
            <div class="gallery-scroll-hint">scroll to walk</div>
          </div>
        </div>
      </div>

      <!-- Left door -->
      <div class="elevator-door door-left" id="doorLeft">
        <div class="door-surface">
          <div class="door-scratches"></div>
          <div class="door-scratches door-scratches-2"></div>
          <div class="door-gouges"></div>
          <div class="door-seam door-seam-edge"></div>
        </div>
      </div>

      <!-- Button panel — on right side wall -->
      <div class="button-panel">
        <div class="panel-surface">
          <!-- Floor buttons: 4 at top → ★1 at bottom -->
          <button class="floor-btn" data-floor="contact"><span class="btn-num">4</span><span class="btn-label">CONNECT</span></button>
          <button class="floor-btn" data-floor="about"><span class="btn-num">3</span><span class="btn-label">ABOUT</span></button>
          <button class="floor-btn" data-floor="hod"><span class="btn-num">2</span><span class="btn-label">H.O.D</span></button>
          <button class="floor-btn" data-floor="gallery"><span class="btn-num">*1</span><span class="btn-label">GALLERY</span></button>
          <div class="panel-divider"></div>
          <!-- Door controls -->
          <div class="panel-door-row">
            <button class="door-btn" data-floor="open" aria-label="Open doors">&#9664;&#9654;</button>
            <button class="door-btn" data-floor="close" aria-label="Close doors">&#9654;&#9664;</button>
          </div>
          <div class="panel-divider"></div>
          <!-- Alarm -->
          <button class="alarm-btn" data-floor="help"><span class="bell-icon"></span></button>
        </div>
      </div>

      <!-- Right door -->
      <div class="elevator-door door-right" id="doorRight">
        <div class="door-surface">
          <div class="door-scratches door-scratches-3"></div>
          <div class="door-scratches door-scratches-4"></div>
          <div class="door-gouges door-gouges-right"></div>
          <div class="door-seam door-seam-edge"></div>
        </div>
      </div>

      <!-- Center seam line -->
      <div class="door-center-seam"></div>

      <!-- Button panel (inside left door — moves with it) -->
    </div>
  </section>

  <!-- Art viewer overlay (global) -->
  <div class="art-viewer" id="artViewer" role="dialog" aria-modal="true" aria-label="Artwork viewer">
    <div class="art-viewer-backdrop"></div>
    <div class="art-viewer-content">
      <div class="art-viewer-media" id="artViewerMedia"></div>
      <div class="art-viewer-info" id="artViewerInfo">
        <h3 class="viewer-title"></h3>
        <p class="viewer-medium"></p>
        <p class="viewer-description"></p>
      </div>
    </div>
    <button class="art-viewer-close" id="artViewerClose" aria-label="Close artwork viewer">&times;</button>
  </div>

  <!-- Floating elevator panel — always accessible -->
  <nav class="elevator-nav" id="elevatorNav" aria-label="Floor navigation">
    <button class="nav-floor-btn" data-nav="hero" aria-label="Lobby">&#9733;</button>
    <button class="nav-floor-btn" data-nav="gallery" aria-label="Gallery">1</button>
    <button class="nav-floor-btn" data-nav="hod" aria-label="Hues of Dispositions">2</button>
    <button class="nav-floor-btn" data-nav="about" aria-label="About">3</button>
    <button class="nav-floor-btn" data-nav="contact" aria-label="Connect">4</button>
  </nav>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js" crossorigin="anonymous"></script>
  <script src="js/arena-loader.js?v=20260403u"></script>
  <script src="js/gallery-data.js?v=20260403u"></script>
  <script src="js/main.js?v=20260403u"></script>
</body>
</html>
